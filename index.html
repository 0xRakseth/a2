    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #e0e0e0;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 1.5rem;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header p {
            font-size: 0.75rem;
            opacity: 0.7;
        }

        .stats-container {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .stat-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 10px 18px;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.2s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            background: rgba(255,255,255,0.2);
        }

        .stat-card.active {
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.25);
            box-shadow: 0 0 12px rgba(233,69,96,0.3);
        }

        .stat-card .title { font-size: 11px; color: #ccc; margin-bottom: 3px; }
        .stat-card .count { font-size: 20px; font-weight: bold; color: #e94560; }

        .flashcard-container {
            width: 100%;
            max-width: 550px;
            height: 370px;
            perspective: 1000px;
            cursor: pointer;
            margin-bottom: 25px;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
        }

        .flashcard.flipped {
            transform: rotateX(180deg);
        }

        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 20px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
            padding: 20px;
            text-align: center;
        }

        .front {
            background: linear-gradient(145deg, #ffffff, #f0f0f0);
            color: #1a1a2e;
            border-bottom: 4px solid #e94560;
        }

        .back {
            background: linear-gradient(145deg, #e94560, #b8304a);
            color: white;
            transform: rotateX(180deg);
        }

        .front .word-en { 
            font-size: 32px; 
            font-weight: bold; 
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .front .word-pron { 
            font-size: 18px; 
            opacity: 0.8; 
            margin-bottom: 15px;
            background: rgba(0,0,0,0.08);
            display: inline-block;
            padding: 4px 14px;
            border-radius: 30px;
            font-family: inherit;
        }
        .back .word-meaning { 
            font-size: 26px; 
            font-weight: bold; 
            line-height: 1.4;
        }
        .back .word-meaning2 {
            font-size: 18px;
            opacity: 0.85;
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.3);
        }
        .flip-hint { margin-top: 20px; font-size: 11px; color: #999; }

        .controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 700px;
            margin-bottom: 18px;
        }

        button {
            padding: 9px 16px;
            border: none;
            border-radius: 40px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
            font-family: inherit;
        }

        button:hover { transform: translateY(-2px); filter: brightness(1.05); }
        button:active { transform: scale(0.96); }

        .btn-correct { background: linear-gradient(135deg, #2ecc71, #27ae60); color: white; }
        .btn-incorrect { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; }
        .btn-unknown { background: linear-gradient(135deg, #f39c12, #e67e22); color: white; }
        .btn-action { background: linear-gradient(135deg, #3498db, #2980b9); color: white; }
        .btn-reset { background: linear-gradient(135deg, #6c5ce7, #5b4bc4); color: white; }

        .keyboard-hint {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 15px;
            text-align: center;
            background: rgba(0,0,0,0.3);
            padding: 6px 14px;
            border-radius: 30px;
        }

        .keyboard-hint b { color: #ffd700; }
        
        @media (max-width: 550px) {
            .front .word-en { font-size: 24px; }
            .front .word-pron { font-size: 14px; }
            .back .word-meaning { font-size: 20px; }
            .back .word-meaning2 { font-size: 14px; }
            button { padding: 7px 12px; font-size: 11px; }
            .stat-card { padding: 6px 12px; }
            .stat-card .count { font-size: 16px; }
            .flashcard-container { height: 320px; }
        }
    </style>
</head>

            ["support", "sıport", "desteklemek", "yardım etmek"],
            ["suppose", "sıpoz", "farz etmek", "sanmak"],
            ["sure", "şur", "emin", "kesin"],
            ["surprise", "sıprayz", "sürpriz", "şaşırtmak"],
            ["surprised", "sıprayzd", "şaşırmış", "hayrete düşmüş"],
            ["survey", "sörvey", "anket", "araştırma"],
            ["sweet", "svit", "tatlı", "şeker"],
            ["swim", "svim", "yüzmek", ""]
        ];

        const STORAGE_KEY = 'a2_word_folders_en_tr';
        const allWordObjects = wordDatabase.map(data => ({
            en: data[0],
            pronunciation: data[1],
            meaning1: data[2],
            meaning2: data[3] || ""
        }));

        let folders = { main: [], correct: [], incorrect: [], unknown: [] };
        let currentFolder = 'main';
        let currentIndex = 0;
        let isFlipped = false;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            return audioCtx;
        }

        function playSound(type) {
            try {
                const ctx = initAudio();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                if (type === 'correct') {
                    osc.type = 'sine';
                    osc.frequency.value = 880;
                    gain.gain.value = 0.15;
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.2);
                } else if (type === 'incorrect') {
                    osc.type = 'triangle';
                    osc.frequency.value = 440;
                    gain.gain.value = 0.12;
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.25);
                } else if (type === 'unknown') {
                    osc.type = 'square';
                    osc.frequency.value = 660;
                    gain.gain.value = 0.1;
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.18);
                }
            } catch(e) {}
        }

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    if (parsed.main && parsed.correct && parsed.incorrect && parsed.unknown) {
                        folders = parsed;
                        return;
                    }
                } catch(e) {}
            }
            folders = {
                main: [...allWordObjects],
                correct: [],
                incorrect: [],
                unknown: []
            };
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(folders));
        }

        function updateStats() {
            document.getElementById('count-main').innerText = folders.main.length;
            document.getElementById('count-correct').innerText = folders.correct.length;
            document.getElementById('count-incorrect').innerText = folders.incorrect.length;
            document.getElementById('count-unknown').innerText = folders.unknown.length;
            saveData();
        }

        function switchFolder(folderName) {
            currentFolder = folderName;
            currentIndex = 0;
            document.querySelectorAll('.stat-card').forEach(card => card.classList.remove('active'));
            document.getElementById(`tab-${folderName}`).classList.add('active');
            showCard();
        }

        function showCard() {
            isFlipped = false;
            const cardEl = document.getElementById('card');
            cardEl.style.transition = 'none';
            cardEl.classList.remove('flipped');
            
            const list = folders[currentFolder];
            if (list.length === 0) {
                document.getElementById('card-en').innerHTML = "📭 Boş klasör!";
                document.getElementById('card-pron').innerHTML = "";
                document.getElementById('card-meaning1').innerHTML = "Diğer klasörlerden taşıyabilirsin";
                document.getElementById('card-meaning2').innerHTML = "";
                return;
            }
            
            if (currentIndex >= list.length) currentIndex = 0;
            const word = list[currentIndex];
            document.getElementById('card-en').innerHTML = word.en;
            document.getElementById('card-pron').innerHTML = word.pronunciation;
            document.getElementById('card-meaning1').innerHTML = word.meaning1;
            document.getElementById('card-meaning2').innerHTML = word.meaning2 ? `(${word.meaning2})` : '';
            
            setTimeout(() => {
                cardEl.style.transition = 'transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1)';
            }, 50);
        }

        function flipCard() {
            const list = folders[currentFolder];
            if (list.length === 0) return;
            isFlipped = !isFlipped;
            document.getElementById('card').classList.toggle('flipped', isFlipped);
        }

        function nextCard() {
            const list = folders[currentFolder];
            if (list.length <= 1) return;
            currentIndex++;
            if (currentIndex >= list.length) currentIndex = 0;
            showCard();
        }

        function shuffleCurrentFolder() {
            const list = folders[currentFolder];
            for (let i = list.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [list[i], list[j]] = [list[j], list[i]];
            }
            currentIndex = 0;
            showCard();
            saveData();
        }

        function moveWord(targetFolder) {
            const list = folders[currentFolder];
            if (list.length === 0) return;
            playSound(targetFolder);
            if (currentFolder === targetFolder) { nextCard(); return; }
            const word = list.splice(currentIndex, 1)[0];
            folders[targetFolder].push(word);
            updateStats();
            if (currentIndex >= list.length) currentIndex = 0;
            showCard();
        }

        function resetAllData() {
            if (confirm('Tüm ilerleme silinecek! Devam etmek istiyor musun?')) {
                folders = { main: [...allWordObjects], correct: [], incorrect: [], unknown: [] };
                currentFolder = 'main';
                currentIndex = 0;
                updateStats();
                showCard();
                document.querySelectorAll('.stat-card').forEach(card => card.classList.remove('active'));
                document.getElementById('tab-main').classList.add('active');
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') { e.preventDefault(); flipCard(); }
            else if (e.code === 'ArrowRight') { e.preventDefault(); nextCard(); }
            else if (e.key === '1') moveWord('correct');
            else if (e.key === '2') moveWord('incorrect');
            else if (e.key === '3') moveWord('unknown');
        });

        loadData();
        updateStats();
        showCard();
        
        document.body.addEventListener('click', function init() {
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            document.body.removeEventListener('click', init);
        });
        
        window.switchFolder = switchFolder;
        window.flipCard = flipCard;
        window.nextCard = nextCard;
        window.shuffleCurrentFolder = shuffleCurrentFolder;
        window.moveWord = moveWord;
        window.resetAllData = resetAllData;
    </script>
</body>
</html>
